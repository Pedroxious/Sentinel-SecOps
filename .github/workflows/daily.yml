name: 🛡️ Sentinel SecOps — CVE Monitor

on:
  schedule:
    - cron: '0 8 * * *'   # 05:00 Brasília
    - cron: '0 14 * * *'  # 11:00 Brasília
    - cron: '0 20 * * *'  # 17:00 Brasília
  workflow_dispatch:       # permite rodar manualmente pelo GitHub

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sentinel:
    name: CVE Scan & AI Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: pip install requests google-generativeai

      - name: 🛡️ Rodar Sentinel SecOps
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVD_API_KEY:    ${{ secrets.NVD_API_KEY }}
        run: python scraper.py

      - name: 💾 Commit automático
        run: |
          git config --global user.name  "Sentinel SecOps Bot"
          git config --global user.email "sentinel-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🔐 Sentinel SecOps — $(TZ='America/Sao_Paulo' date '+%Y-%m-%d %H:%M') (Brasília)"
          git push
