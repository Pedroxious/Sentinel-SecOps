name: Sentinel SecOps - Threat Intel Monitor

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * *'   # 05:00 Brasília
    - cron: '0 14 * * *'  # 11:00 Brasília
    - cron: '0 20 * * *'  # 17:00 Brasília
  workflow_dispatch:       # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  sentinel:
    name: CVE Scan & AI Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests google-generativeai fpdf2 pandas

      - name: Run Sentinel SecOps
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVD_API_KEY:    ${{ secrets.NVD_API_KEY }}
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name  "Sentinel SecOps Bot"
          git config --global user.email "sentinel-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update: Threat Intel Report $(TZ='America/Sao_Paulo' date '+%Y-%m-%d %H:%M')"
          git push
